<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @font-face {
            font-family: 'ZombiessDemoFont';
            src: url('../fonts/ZombiessDemo.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }
        body {
            margin: 0;
            padding: 0;
            background: url('../images/BG.png') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-family: 'ZombiessDemoFont', 'Courier New', monospace;
            overflow: hidden;
        }
        .clock {
            font-size: 5rem;
            font-weight: normal;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 4px 20px rgba(0, 0, 0, 0.6);
            letter-spacing: 0.05em;
            font-family: 'ZombiessDemoFont', 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="clock" id="clock">12:24</div>
    <script>
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
