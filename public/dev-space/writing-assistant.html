<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #080b14;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .internet-banner {
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.08));
            border-bottom: 1px solid rgba(245, 158, 11, 0.3);
            padding: 8px 20px;
            font-size: 12px;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            flex-shrink: 0;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .close-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #f87171;
            font-size: 1.2rem;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: scale(1.05);
        }

        .actions-bar {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.01);
            flex-wrap: wrap;
            align-items: center;
            flex-shrink: 0;
        }

        .action-btn {
            background: rgba(167, 139, 250, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.25);
            color: #c4b5fd;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Space Grotesk', sans-serif;
            white-space: nowrap;
        }

        .action-btn:hover,
        .action-btn.active {
            background: rgba(167, 139, 250, 0.25);
            border-color: rgba(167, 139, 250, 0.5);
            color: #ddd6fe;
            box-shadow: 0 0 12px rgba(167, 139, 250, 0.2);
            transform: translateY(-1px);
        }

        .action-btn.active {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.3), rgba(96, 165, 250, 0.2));
            border-color: rgba(167, 139, 250, 0.6);
        }

        .lang-select {
            background: rgba(96, 165, 250, 0.12);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: #93c5fd;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .lang-select option {
            background: #1a1f2e;
            color: #e2e8f0;
        }

        .lang-select:hover {
            border-color: rgba(96, 165, 250, 0.5);
        }

        .lang-select.hidden {
            display: none;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow: hidden;
        }

        .pane-left {
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        .pane-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pane-label .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #a78bfa;
        }

        .input-textarea {
            flex: 1;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: #e2e8f0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            line-height: 1.7;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-textarea:focus {
            border-color: rgba(167, 139, 250, 0.4);
            background: rgba(255, 255, 255, 0.04);
        }

        .input-textarea::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .result-area {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.7;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .result-placeholder {
            color: rgba(255, 255, 255, 0.25);
            text-align: center;
            padding: 40px 20px;
        }

        .result-placeholder .icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .pane-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .token-counter {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .token-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 1.5s infinite;
        }

        .token-dot.idle {
            background: rgba(255, 255, 255, 0.2);
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .copy-btn {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: #34d399;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.4);
            transform: translateY(-1px);
        }

        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #a78bfa;
            animation: blink 0.7s ease-in-out infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 8px;
            padding: 12px;
            color: #f87171;
            font-size: 13px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div class="internet-banner">
        <span>📡</span>
        <span>Requires internet connection — powered by Groq (`openai/gpt-oss-120b`)</span>
    </div>

    <div class="header">
        <div class="header-title"><span>✍️</span> Writing Assistant</div>
        <button class="close-btn" onclick="closePanel()" title="Close (ESC)">✕</button>
    </div>

    <div class="actions-bar">
        <button class="action-btn active" data-action="improve" onclick="setAction('improve', this)">✨ Improve</button>
        <button class="action-btn" data-action="simplify" onclick="setAction('simplify', this)">🔤 Simplify</button>
        <button class="action-btn" data-action="formal" onclick="setAction('formal', this)">👔 Make Formal</button>
        <button class="action-btn" data-action="casual" onclick="setAction('casual', this)">😊 Make Casual</button>
        <button class="action-btn" data-action="translate" onclick="setAction('translate', this)">🌐 Translate</button>
        <button class="action-btn" data-action="summarize" onclick="setAction('summarize', this)">📝 Summarize</button>
        <button class="action-btn" data-action="grammar" onclick="setAction('grammar', this)">✅ Fix Grammar</button>
        <select class="lang-select hidden" id="langSelect">
            <option value="Spanish">🇪🇸 Spanish</option>
            <option value="French">🇫🇷 French</option>
            <option value="German">🇩🇪 German</option>
            <option value="Japanese">🇯🇵 Japanese</option>
            <option value="Mandarin">🇨🇳 Mandarin</option>
            <option value="Hindi">🇮🇳 Hindi</option>
            <option value="Arabic">🇸🇦 Arabic</option>
            <option value="Portuguese">🇧🇷 Portuguese</option>
            <option value="Italian">🇮🇹 Italian</option>
            <option value="Korean">🇰🇷 Korean</option>
        </select>
        <button class="action-btn" onclick="processText()"
            style="background:linear-gradient(135deg,rgba(167,139,250,0.3),rgba(96,165,250,0.2));border-color:rgba(167,139,250,0.5);margin-left:auto;">⚡
            Run</button>
    </div>

    <div class="main-content">
        <div class="pane pane-left">
            <div class="pane-label"><span class="dot"></span>Input Text</div>
            <textarea class="input-textarea" id="inputText"
                placeholder="Paste or type your text here...&#10;&#10;Then choose an action above and click Run ⚡"></textarea>
        </div>
        <div class="pane">
            <div class="pane-label"><span class="dot" style="background:#60a5fa"></span>Result</div>
            <div class="result-area" id="resultArea">
                <div class="result-placeholder">
                    <div class="icon">🚀</div>
                    <div>Select an action and click <strong>Run</strong> to get started</div>
                </div>
            </div>
            <div class="pane-footer">
                <div class="token-counter">
                    <div class="token-dot idle" id="tokenDot"></div>
                    <span id="tokenCount">0 tokens</span>
                </div>
                <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
            </div>
        </div>
    </div>

    <script>
        const GROQ_API_URL = 'https://prism-ai-browser-api-hcb9hra7e8eecjca.centralindia-01.azurewebsites.net/api/prism_groq_devspace';
        const GROQ_MODEL = 'openai/gpt-oss-120b';

        let currentAction = 'improve';
        let isStreaming = false;
        let tokenCount = 0;

        const systemPrompts = {
            improve: "You are an expert writing coach. Improve the given text to make it clearer, more engaging, and more polished. Maintain the original meaning but enhance the language, flow, and impact. Only output the improved text without any explanation.",
            simplify: "You are a writing simplification expert. Rewrite the given text in simpler language that's easy to understand for everyone. Use shorter sentences, common words, and clear structure. Only output the simplified text without any explanation.",
            formal: "You are a professional writer. Transform the given text into a formal, professional tone suitable for business or academic contexts. Use proper vocabulary and formal language conventions. Only output the formal version without any explanation.",
            casual: "You are a friendly conversational writer. Transform the given text into a casual, friendly, and natural-sounding tone. Make it feel warm and approachable. Only output the casual version without any explanation.",
            translate: (lang) => `You are a professional translator. Translate the given text to ${lang}. Provide only the translation with no additional commentary.`,
            summarize: "You are an expert summarizer. Create a concise summary of the given text, capturing the key points and main ideas in 1-3 paragraphs. Only output the summary without any explanation.",
            grammar: "You are a grammar expert and proofreader. Fix all grammar, spelling, punctuation, and style errors in the given text. Preserve the original meaning and tone as much as possible. Only output the corrected text without explanations."
        };

        function setAction(action, btn) {
            currentAction = action;
            document.querySelectorAll('.action-btn[data-action]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('langSelect').classList.toggle('hidden', action !== 'translate');
        }



        function getGroqError(xhr) {
            try {
                const payload = JSON.parse(xhr.responseText);
                if (payload && payload.error) {
                    return typeof payload.error === 'string' ? payload.error : (payload.error.message || 'Groq request failed');
                }
            } catch (_) { }
            return xhr.status === 0 ? 'Network error or blocked request' : `Groq request failed (${xhr.status})`;
        }

        function buildGroqPayload(messages, opts) {
            const payload = Object.assign({ model: GROQ_MODEL, messages, stream: true }, opts || {});
            if (payload.max_tokens != null && payload.max_completion_tokens == null) {
                payload.max_completion_tokens = payload.max_tokens;
            }
            delete payload.max_tokens;
            if (payload.reasoning_effort == null) {
                payload.reasoning_effort = 'medium';
            }
            return payload;
        }

        // XHR-based streaming — calls Azure proxy (no API key needed client-side)
        function xhrStream(messages, opts, onChunk, onDone, onErr) {
            try {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', GROQ_API_URL, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                let pos = 0;
                function parse() {
                    const raw = xhr.responseText;
                    if (raw.length <= pos) return;
                    const newText = raw.slice(pos);
                    pos = raw.length;
                    newText.split('\n').forEach(line => {
                        if (!line.startsWith('data: ')) return;
                        const d = line.slice(6).trim();
                        if (d === '[DONE]') return;
                        try { const tok = JSON.parse(d)?.choices?.[0]?.delta?.content || ''; if (tok) onChunk(tok); } catch (_) { }
                    });
                }
                xhr.onprogress = parse;
                xhr.onload = () => {
                    parse();
                    if (xhr.status >= 200 && xhr.status < 300) {
                        onDone && onDone();
                        return;
                    }
                    onErr && onErr(getGroqError(xhr));
                };
                xhr.onerror = () => onErr && onErr('Network error — check internet connection');
                xhr.ontimeout = () => onErr && onErr('Request timed out after 2 minutes');
                xhr.timeout = 120000;
                xhr.send(JSON.stringify(buildGroqPayload(messages, Object.assign({ max_tokens: 4096, temperature: 0.7, top_p: 1.0 }, opts || {}))));
            } catch (e) { onErr && onErr(e.message); }
        }

        function processText() {
            if (isStreaming) return;
            const inputText = document.getElementById('inputText').value.trim();
            if (!inputText) { showError('Please enter some text first!'); return; }

            const resultArea = document.getElementById('resultArea');
            const tokenDot = document.getElementById('tokenDot');
            const tokenCountEl = document.getElementById('tokenCount');

            isStreaming = true;
            tokenCount = 0;
            resultArea.innerHTML = '<span id="streamContent"></span><span class="streaming-cursor"></span>';
            tokenDot.classList.remove('idle');
            tokenCountEl.textContent = '0 tokens';

            let systemPrompt = systemPrompts[currentAction];
            if (currentAction === 'translate') systemPrompt = systemPrompts.translate(document.getElementById('langSelect').value);

            let fullText = '';
            xhrStream(
                [{ role: 'system', content: systemPrompt }, { role: 'user', content: inputText }],
                null,
                (tok) => {
                    fullText += tok; tokenCount++;
                    const sc = document.getElementById('streamContent');
                    if (sc) { sc.textContent = fullText; tokenCountEl.textContent = `~${tokenCount} tokens`; resultArea.scrollTop = resultArea.scrollHeight; }
                },
                () => {
                    const cursor = resultArea.querySelector('.streaming-cursor');
                    if (cursor) cursor.remove();
                    tokenDot.classList.add('idle');
                    isStreaming = false;
                },
                (err) => { showError('Error: ' + err); tokenDot.classList.add('idle'); isStreaming = false; }
            );
        }

        function showError(msg) { document.getElementById('resultArea').innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`; }

        function copyResult() {
            const content = document.getElementById('streamContent');
            const text = content ? content.textContent : document.getElementById('resultArea').textContent;
            if (!text || text.includes('Select an action')) { showToast('Nothing to copy!', 'warn'); return; }
            navigator.clipboard.writeText(text).then(() => showToast('✅ Copied!')).catch(() => showToast('❌ Copy failed', 'err'));
        }

        function showToast(msg, type) {
            const t = document.createElement('div');
            const bg = type === 'err' ? 'rgba(239,68,68,0.9)' : type === 'warn' ? 'rgba(245,158,11,0.9)' : 'rgba(16,185,129,0.9)';
            t.style.cssText = `position:fixed;top:16px;right:16px;background:${bg};color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.4)`;
            t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        window.closePanel = function () {
            if (window.parent && window.parent !== window) {
                try { window.parent.postMessage({ action: 'closeWritingAssistant' }, '*'); } catch (e) { }
                try { if (typeof window.parent.closeWritingAssistant === 'function') window.parent.closeWritingAssistant(); } catch (e) { }
            } else { window.close(); }
        };

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
    </script>
</body>

</html>
